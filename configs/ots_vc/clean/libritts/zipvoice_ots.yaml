# @package _global_

run_name: "zipvoice_ots_on_libritts"
device: "cuda:0"
base_dir: "."

vc:
  mode: "ots"
  model: "zipvoice"

output_paths:
  metrics_file: "results/zipvoice_ots_on_libritts/metrics.json"

adversary:
  code_path: "checkpoints/ZipVoice"
  model_dir: null
  model_name: zipvoice
  tokenizer: libritts
  lang: en-us
  use_sample_language: false
  checkpoint_name: model.pt
  guidance_scale: null
  num_step: null
  feat_scale: 0.1
  speed: 1.0
  t_shift: 0.5
  target_rms: 0.1
  raw_evaluation: false
  max_duration: 100.0
  remove_long_sil: false
  num_thread: 1
  seed: null
  max_samples: null
  default_prompt_text: "Here is a sample of the desired voice."

batch_size: 16 # not used in VC

defaults:
  - _self_
  - /dataset: libritts
evaluation:
  bootstrap:
    enabled: true
    num_samples: 1000
    confidence_level: 0.95
    seed: null
